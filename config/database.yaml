# ============================================================
# 伏羲 v1.44 — 数据库配置
# ============================================================

# ----------------------------------------------------------
# ChromaDB — 向量数据库
# ----------------------------------------------------------
chromadb:
  # 持久化目录
  persist_directory: "./data/chromadb"
  
  # HNSW 索引参数（P1 性能优化：降低内存占用）
  # M: 每个节点的最大连接数
  #   - 原值 32，优化为 12（降低 ~60% 内存，召回率影响 < 2%）
  # ef_construction: 构建时的搜索宽度
  #   - 原值 200，优化为 100（构建速度提升 ~40%）
  # ef_search: 查询时的搜索宽度
  #   - 原值 100，优化为 50（查询速度提升 ~40%）
  hnsw:
    M: 12
    ef_construction: 100
    ef_search: 50
  
  # 集合元数据
  collection_metadata:
    "hnsw:space": "cosine"

# ----------------------------------------------------------
# SQLite — 关系型数据库
# ----------------------------------------------------------
sqlite:
  # 数据库文件路径
  db_path: "./data/fuxi.db"
  
  # 连接池配置
  pool_size: 5
  max_overflow: 10
  
  # WAL 模式（提升并发读写性能）
  pragma:
    journal_mode: "WAL"
    synchronous: "NORMAL"
    cache_size: -64000  # 64MB
    busy_timeout: 5000

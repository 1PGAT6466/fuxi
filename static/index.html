<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>伏羲 4.2 · 问卦</title>
<style>
:root{
  --paper:#F5F0E8;--parchment:#EFE8DA;
  --ink-deep:#1a140d;--ink:#2c2418;--ink-mid:#534a3d;--ink-light:#8a8070;--ink-faint:#bfb7a8;
  --cinnabar:#b8381a;--cinnabar-light:#d44a2a;--cinnabar-dim:rgba(184,56,26,0.07);
  --gold:#8b6914;--gold-light:rgba(139,105,20,0.08);
  --font-display:"Noto Serif SC","Songti SC","SimSun",serif;
  --font-body:"Noto Serif SC","PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;height:100%}
body{
  background:var(--paper);
  color:var(--ink);font-family:var(--font-body);
  height:100%;display:flex;overflow:hidden;
  -webkit-font-smoothing:antialiased;line-height:1.6;
}

/* ===== 左侧导航 ===== */
#sidebar{
  width:48px;flex-shrink:0;display:flex;flex-direction:column;
  background:rgba(255,255,255,0.4);border-right:1px solid rgba(139,105,20,0.08);
  align-items:center;padding:12px 0;gap:2px;position:relative;z-index:10;
}
#sidebar .logo{
  font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--cinnabar);
  margin-bottom:10px;cursor:default;letter-spacing:.04em;
}
#sidebar .nav-icon{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;cursor:pointer;font-size:16px;color:var(--ink-light);
  transition:all .15s;position:relative;
}
#sidebar .nav-icon:hover{background:var(--gold-light);color:var(--ink)}
#sidebar .nav-icon.active{background:var(--cinnabar-dim);color:var(--cinnabar)}
#sidebar .nav-icon .tooltip{
  display:none;position:absolute;left:48px;top:50%;transform:translateY(-50%);
  background:var(--ink);color:var(--paper);padding:4px 10px;border-radius:6px;
  font-size:11px;white-space:nowrap;z-index:20;font-family:var(--font-display);
}
#sidebar .nav-icon:hover .tooltip{display:block}

/* ===== 主区域 ===== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* 顶栏 */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:48px;flex-shrink:0;
  border-bottom:1px solid rgba(139,105,20,0.08);
  background:rgba(255,255,255,0.3);backdrop-filter:blur(12px);
}
#topbar .title{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--ink-deep);letter-spacing:.04em}
#topbar .time{font-size:11px;color:var(--ink-faint);font-family:var(--font-display)}

/* 内容面板容器 */
#panels{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* 聊天面板 */
#panel-chat{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  max-width:800px;margin:0 auto;width:100%;
}
#panel-chat.hidden{display:none}

/* 消息列表 */
#messages{
  flex:1;overflow-y:auto;padding:16px 20px 0;
  scroll-behavior:smooth;
}
#messages .welcome{
  text-align:center;padding:40px 20px 16px;
}
#messages .welcome .gua{
  font-family:var(--font-display);font-size:40px;color:var(--cinnabar);
  opacity:.6;margin-bottom:4px;
}
#messages .welcome h2{
  font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--ink-deep);
}
#messages .welcome p{font-size:12px;color:var(--ink-light);margin-top:4px;line-height:1.7}

/* 快速提示 */
.hints{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
  padding:8px 0 16px;
}
.hints span{
  padding:5px 14px;border:1px solid rgba(139,105,20,0.15);border-radius:16px;
  cursor:pointer;font-size:11px;color:var(--ink-mid);transition:all .2s;
  font-family:var(--font-display);background:rgba(255,255,255,0.4);
}
.hints span:hover{border-color:var(--cinnabar);color:var(--cinnabar);background:var(--cinnabar-dim)}

/* 消息气泡 */
.msg{padding:0 0 14px;animation:in .3s ease}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{display:flex;justify-content:flex-end}
.msg.user .bubble{
  background:var(--cinnabar);color:#fff;padding:10px 18px;
  border-radius:16px 4px 16px 16px;max-width:75%;line-height:1.6;
  font-size:13px;box-shadow:0 2px 8px rgba(184,56,26,0.1);
}
.msg.assistant .bubble{
  background:rgba(255,255,255,0.7);padding:14px 20px;
  border-radius:4px 16px 16px 16px;max-width:90%;
  border:1px solid rgba(139,105,20,0.08);font-size:13px;line-height:1.7;
}
.msg.loading .bubble{color:var(--ink-light);font-style:italic}
.msg.system .bubble{
  background:transparent;text-align:center;color:var(--ink-light);
  font-size:11px;font-style:italic;border:none;padding:8px;max-width:100%;
}
.bubble h1,.bubble h2,.bubble h3{font-family:var(--font-display);color:var(--ink-deep);margin:8px 0 3px}
.bubble h1{font-size:16px}.bubble h2{font-size:15px}.bubble h3{font-size:14px}
.bubble code{background:rgba(0,0,0,0.04);padding:1px 5px;border-radius:2px;font-size:12px}
.bubble li{margin-left:14px;margin-bottom:1px}
.bubble strong{color:var(--ink-deep)}

.source-card{
  display:inline-block;padding:3px 10px;margin:3px 3px 0 0;
  border:1px solid rgba(139,105,20,0.12);border-radius:10px;
  font-size:10px;color:var(--ink-mid);cursor:pointer;transition:all .15s;
}
.source-card:hover{border-color:var(--cinnabar);color:var(--cinnabar)}

/* 输入栏 */
#input-bar{
  flex-shrink:0;padding:10px 20px 14px;
}
#input-bar .wrap{
  display:flex;gap:8px;background:rgba(255,255,255,0.7);
  border:1px solid rgba(139,105,20,0.12);border-radius:20px;
  padding:6px 6px 6px 14px;transition:all .25s;
  backdrop-filter:blur(8px);
}
#input-bar .wrap:focus-within{border-color:var(--cinnabar);box-shadow:0 0 0 3px var(--cinnabar-dim)}
#input-bar textarea{
  flex:1;border:none;background:transparent;font-size:13px;font-family:var(--font-body);
  color:var(--ink);resize:none;outline:none;line-height:1.4;padding:5px 0;
  min-height:20px;max-height:100px;align-self:center;
}
#input-bar textarea::placeholder{color:var(--ink-faint)}
#input-bar .send{
  width:34px;height:34px;border:none;border-radius:50%;background:var(--cinnabar);
  color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
#input-bar .send:hover{background:var(--cinnabar-light);transform:scale(1.06)}
#input-bar .search-tgl{
  display:flex;align-items:center;gap:5px;margin-top:6px;font-size:10px;
  color:var(--ink-light);cursor:pointer;user-select:none;
}
#input-bar .search-tgl .d{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);transition:all .2s}
#input-bar .search-tgl.active .d{background:var(--cinnabar)}

/* 其他面板 */
.panel-page{
  flex:1;overflow-y:auto;padding:24px 28px;display:none;
  max-width:800px;margin:0 auto;width:100%;
}
.panel-page.show{display:block}
.panel-page h2{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--ink-deep);margin-bottom:16px}

.tools-grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.tool-card2{
  padding:20px 14px;text-align:center;cursor:pointer;
  border:1px solid rgba(139,105,20,0.1);border-radius:10px;
  background:rgba(255,255,255,0.4);transition:all .25s;
}
.tool-card2:hover{border-color:var(--cinnabar);background:var(--cinnabar-dim);transform:translateY(-1px)}
.tool-card2 .ic{font-size:28px;margin-bottom:6px}
.tool-card2 .nm{font-family:var(--font-display);font-size:12px;font-weight:600;color:var(--ink)}
.tool-card2 .ds{font-size:10px;color:var(--ink-light);margin-top:3px}

.faq-item2{
  padding:14px 18px;cursor:pointer;margin-bottom:6px;
  border:1px solid rgba(139,105,20,0.08);border-radius:10px;
  background:rgba(255,255,255,0.4);transition:all .2s;
  border-left:3px solid transparent;
}
.faq-item2:hover{border-left-color:var(--cinnabar);background:var(--cinnabar-dim)}
.faq-item2 .q{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--ink)}
.faq-item2 .a{font-size:11px;color:var(--ink-light);margin-top:3px}

.upload-zone2{
  padding:32px;text-align:center;
  border:2px dashed rgba(139,105,20,0.14);border-radius:10px;
  cursor:pointer;transition:all .25s;background:rgba(255,255,255,0.3);
}
.upload-zone2:hover{border-color:var(--cinnabar);background:var(--cinnabar-dim)}
.upload-zone2 .ic{font-size:32px;margin-bottom:6px}
.upload-zone2 p{font-size:12px;color:var(--ink-mid)}
.upload-zone2 .hint{font-size:10px;color:var(--ink-faint);margin-top:3px}
.upload-status2{margin-top:10px;font-size:11px;color:var(--ink-mid);font-family:var(--font-display)}

/* ===== 藏印不起眼的右下角 ===== */
#seal{
  position:fixed;bottom:24px;right:28px;opacity:.1;
  font-family:var(--font-display);font-size:28px;color:var(--cinnabar);
  transform:rotate(-12deg);pointer-events:none;
  border:1px solid var(--cinnabar);padding:6px 10px;border-radius:3px;
  line-height:1.1;z-index:0;user-select:none;
}

/* Loading spinner */
.loading{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
.loading-lg{width:32px;height:32px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:absolute;inset:0;background:rgba(245,240,232,0.8);display:flex;align-items:center;justify-content:center;z-index:10;border-radius:inherit}
.loading-text{font-size:13px;color:var(--text3);display:flex;align-items:center;gap:8px}
.skeleton{background:linear-gradient(90deg,var(--border) 25%,rgba(139,105,20,0.05) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-text{height:14px;margin-bottom:8px}.skeleton-text:last-child{width:60%}
.skeleton-card{height:80px;border-radius:8px;margin-bottom:8px}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="logo">伏<br>羲</div>
  <div class="nav-icon active" onclick="switchPanel('chat')" title="问答">
    ☰<span class="tooltip">问答</span>
  </div>
  <div class="nav-icon" onclick="switchPanel('tools')" title="工具">
    ✦<span class="tooltip">工具</span>
  </div>
  <div class="nav-icon" onclick="switchPanel('faq')" title="常见问题">
    ☷<span class="tooltip">常见问题</span>
  </div>
  <div class="nav-icon" onclick="switchPanel('upload')" title="上传">
    ↑<span class="tooltip">上传</span>
  </div>
  <div style="flex:1"></div>
  <div class="nav-icon" onclick="clearChat()" title="清空对话" style="font-size:13px">
    ↺<span class="tooltip">清空对话</span>
  </div>
</nav>

<div id="main">
  <div id="topbar">
    <span class="title" id="topbar-title">伏羲问答</span>
    <span class="time" id="topbar-time"></span>
  </div>

  <div id="panels">
    <!-- 聊天 -->
    <div id="panel-chat">
      <div id="messages">
        <div class="welcome">
          <div class="gua">☰</div>
          <h2>伏羲问卦</h2>
          <p>以八卦推演万物，以知识洞见本真。<br>有何事相询？</p>
        </div>
        <div class="hints">
          <span onclick="quickAsk('PA66 拉伸强度是多少？')">PA66 拉伸强度</span>
          <span onclick="quickAsk('VLAN 怎么配置？')">VLAN 配置</span>
          <span onclick="quickAsk('导柱导套选型标准？')">导柱导套选型</span>
          <span onclick="quickAsk('PLC 怎么选型？')">PLC 选型</span>
        </div>
      </div>
      <div id="input-bar">
        <div class="wrap">
          <textarea id="chat-input" placeholder="写下问题…" rows="1" onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
          <button class="send" onclick="sendMessage()">↑</button>
        </div>
        <div class="search-tgl" id="ext-btn" onclick="toggleExternal()">
          <span class="d"></span> 联网搜索
        </div>
      </div>
    </div>

    <!-- 工具 -->
    <div class="panel-page" id="panel-tools">
      <h2>✦ 常用工具</h2>
      <div class="tools-grid2" id="tools-grid"></div>
    </div>

    <!-- FAQ -->
    <div class="panel-page" id="panel-faq">
      <h2>☷ 常见问题</h2>
      <div id="faq-list"></div>
    </div>

    <!-- 上传 -->
    <div class="panel-page" id="panel-upload">
      <h2>↑ 上传文档</h2>
      <div class="upload-zone2" id="user-upload-zone" onclick="document.getElementById('user-finput').click()">
        <div class="ic">📜</div>
        <p>拖拽文件或点击上传</p>
        <p class="hint">PDF、DOCX、XLSX、TXT、MD、图片</p>
      </div>
      <input type="file" id="user-finput" multiple onchange="userUpload(this.files)" style="display:none" accept=".pdf,.docx,.doc,.xlsx,.xls,.txt,.md,.csv,.json,.xml,.html,.htm,.jpg,.jpeg,.png,.gif,.bmp,.svg">
      <div class="upload-status2" id="upload-status"></div>
    </div>
  </div>
</div>

<div id="seal">伏<br>羲</div>

<script src="/static/js/marked.min.js"></script>
<script>
const API = '';
let enableExternal = true;
let chatHistory = [];
let currentPanel = 'chat';
const adminToken = 'polygon-admin-2024';

// ========== 面板切换 ==========
function switchPanel(name, fromPopState) {
  currentPanel = name;
  document.querySelectorAll('#panel-chat').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.panel-page').forEach(p => p.classList.remove('show'));
  document.querySelectorAll('.nav-icon').forEach(n => n.classList.remove('active'));
  if (name === 'chat') {
    document.getElementById('panel-chat').classList.remove('hidden');
  } else {
    document.getElementById('panel-chat').classList.add('hidden');
    var panel = document.getElementById('panel-' + name);
    if (panel) panel.classList.add('show');
  }
  // Highlight active nav icon
  var navIcons = document.querySelectorAll('.nav-icon');
  navIcons.forEach(function(n) {
    var onclick = n.getAttribute('onclick') || '';
    if (onclick.indexOf("'" + name + "'") !== -1) n.classList.add('active');
  });
  // Update title
  var titles = {chat:'伏羲问答', tools:'常用工具', faq:'常见问题', upload:'上传文档'};
  document.getElementById('topbar-title').textContent = titles[name] || name;
  // Update URL hash (without triggering popstate)
  if (!fromPopState) {
    var newHash = '#' + name;
    if (window.location.hash !== newHash) {
      history.pushState({panel: name}, '', newHash);
    }
  }
  // Load data
  if (name === 'tools') loadTools();
  if (name === 'faq') loadFAQ();
}

// Handle browser back/forward
window.addEventListener('popstate', function(e) {
  var hash = window.location.hash.replace('#', '') || 'chat';
  if (['chat','tools','faq','upload'].indexOf(hash) !== -1) {
    switchPanel(hash, true);
  }
});

// On page load, restore from URL hash
(function() {
  var hash = window.location.hash.replace('#', '');
  if (hash && ['chat','tools','faq','upload'].indexOf(hash) !== -1) {
    // Defer to after DOM ready
    document.addEventListener('DOMContentLoaded', function() {
      switchPanel(hash, true);
    });
  }
})();

// ========== 对话功能 ==========
function toggleExternal() {
  enableExternal = !enableExternal;
  const btn = document.getElementById('ext-btn');
  btn.textContent = enableExternal ? '🌐 联网搜索' : '🌐 仅本地';
  btn.classList.toggle('active', enableExternal);
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if (!q) return;
  
  input.value = '';
  addMessage('user', q);
  addMessage('assistant', '思考中…', true);
  
  chatHistory.push({ role: 'user', content: q });
  saveChatHistory();
  
  try {
    const res = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q, history: chatHistory.slice(-10), stream: false }),
    });
    const data = await res.json();
    
    // 移除 loading
    const msgs = document.getElementById('messages');
    const loading = msgs.querySelector('.loading');
    if (loading) loading.remove();
    
    const answer = data.answer || '未获取到回答';
    const mode = data.mode || 'unknown';
    const sources = data.sources || [];
    
    // 构建来源信息
    let sourceInfo = '';
    if (sources.length > 0) {
      sourceInfo = '<div style="margin-top:8px">';
      sources.slice(0, 3).forEach(s => {
        const name = s.file_name || s.title || s.file || '来源';
        sourceInfo += `<div class="source-card" onclick="window.open('${s.url||'#'}','_blank')">📎 ${name.substring(0,40)}</div>`;
      });
      sourceInfo += '</div>';
    }
    
    addMessage('assistant', renderMarkdown(answer) + sourceInfo);
    chatHistory.push({ role: 'assistant', content: answer });
    saveChatHistory();
    
  } catch(e) {
    const msgs = document.getElementById('messages');
    const loading = msgs.querySelector('.loading');
    if (loading) loading.remove();
    addMessage('assistant', '❌ 请求失败: ' + e.message);
  }
}

function addMessage(role, content, isLoading=false) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role + (isLoading ? ' loading' : '');
  div.innerHTML = '<div class="bubble">' + content + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function quickAsk(q) {
  document.getElementById('chat-input').value = q;
  switchPanel('chat');
  sendMessage();
}

function clearChat() {
  document.getElementById('messages').innerHTML = '<div class="msg system">对话已清空。有什么可以帮你？</div>';
  chatHistory = [];
  localStorage.removeItem('fuxi-chat-history');
}

function saveChatHistory() {
  try {
    localStorage.setItem('fuxi-chat-history', JSON.stringify(chatHistory.slice(-20)));
    renderHistoryList();
  } catch(e) {}
}

function renderHistoryList() {
  const el = document.getElementById('chat-history');
  const items = chatHistory.filter(h => h.role === 'user').slice(-15);
  el.innerHTML = items.map((h,i) => 
    `<div class="history-item" onclick="replayChat(${i})">
      <div>${h.content.substring(0,30)}…</div>
    </div>`
  ).join('');
}

function replayChat(idx) {
  switchPanel('chat');
}

// ========== 简单 Markdown 渲染 ==========
function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '<br><br>');
}

// ========== 常用工具 ==========
async function loadTools() {
  const el = document.getElementById('tools-grid');
  try {
    const res = await fetch(API + '/api/tools');
    const data = await res.json();
    const tools = data.tools || [];
    el.innerHTML = tools.map(t => `
      <div class="tool-card2"
           onclick="window.open('${t.url||'#'}','_blank')">
        <div class="ic">${t.icon||'🔧'}</div>
        <div class="nm">${t.name||''}</div>
        <div class="ds">${t.desc||''}</div>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = '<div style="color:var(--text-dim)">加载失败</div>';
  }
}

// ========== 常见问题 ==========
async function loadFAQ() {
  const el = document.getElementById('faq-list');
  try {
    const res = await fetch(API + '/api/faq');
    const data = await res.json();
    const faqs = data.faqs || data.faq || [];
    el.innerHTML = faqs.length === 0 
      ? '<div class="empty-msg">暂无常见问题</div>'
      : faqs.map(f => `
        <div class="faq-item2"
             onclick="switchPanel('chat');document.getElementById('chat-input').value='${f.question||''}';sendMessage()">
          <div class="q">${f.question||''}</div>
          <div class="a">${(f.answer||'').substring(0,80)}…</div>
        </div>
      `).join('');
  } catch(e) {
    el.innerHTML = '<div style="color:var(--text-dim)">加载失败</div>';
  }
}

// ========== 用户上传 ==========
async function userUpload(fileList) {
  const status = document.getElementById('upload-status');
  const files = Array.from(fileList);
  
  for (const file of files) {
    status.textContent = `上传中: ${file.name}…`;
    try {
      const form = new FormData();
      form.append('file', file);
      const res = await fetch(API + '/api/upload', {
        method: 'POST',
        body: form,
        headers: { 'x-admin-token': adminToken },
      });
      const data = await res.json();
      status.textContent = data.ok ? `✅ ${file.name} 上传成功` : `❌ ${file.name}: ${data.error||'失败'}`;
    } catch(e) {
      status.textContent = `❌ ${file.name} 上传失败`;
    }
  }
}

// 上传拖拽
document.addEventListener('DOMContentLoaded', () => {
  const zone = document.getElementById('user-upload-zone');
  if (zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--orange)'; });
    zone.addEventListener('dragleave', () => zone.style.borderColor = 'var(--orange)');
    zone.addEventListener('drop', e => { e.preventDefault(); userUpload(e.dataTransfer.files); });
  }
  
  // 恢复历史
  try {
    const saved = localStorage.getItem('fuxi-chat-history');
    if (saved) chatHistory = JSON.parse(saved);
    renderHistoryList();
  } catch(e) {}
  
  // 自动调整 textarea 高度
  const ta = document.getElementById('chat-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });
});

// Time updater
(function updateTime(){
  var el = document.getElementById('topbar-time');
  if (el) {
    var d = new Date();
    el.textContent = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }
  setTimeout(updateTime, 30000);
})();
</script>

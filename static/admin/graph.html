<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>宝利根·知书阁</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Serif SC',serif;overflow:hidden;height:100vh}

/* ========== 全局色调 ========== */
:root{
  --paper:#f6f1e3;
  --paperDark:#ece3d0;
  --ink:#2c2416;
  --inkLight:#5c4a2c;
  --wood:#5d3f2c;
  --woodDark:#3e2818;
  --woodLight:#8b6914;
  --accent:#b8860b;
  --accentLight:#d4a843;
  --shelf:#2c1810;
  --book1:#6b4423;
  --book2:#3d5a40;
  --book3:#5c3d2e;
  --book4:#2e4a5c;
  --book5:#744d3d;
  --book6:#4a3d5c;
  --book7:#3d5a5c;
  --book8:#5c4a2c;
  --cardBG:#fdfaf2;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --radius:8px;
}

/* ========== 布局 ========== */
body{background:var(--paper);display:flex;flex-direction:column}

/* 顶栏 */
#topbar{
  display:flex;align-items:center;gap:16px;
  padding:12px 24px;background:linear-gradient(180deg,rgba(246,241,227,.98),rgba(246,241,227,.9));
  border-bottom:2px solid var(--woodLight);
  backdrop-filter:blur(8px);z-index:10;flex-shrink:0;
}
#topbar .logo{font-size:22px;font-weight:700;color:var(--woodDark);letter-spacing:2px}
#topbar input{
  flex:1;max-width:480px;padding:10px 18px;
  border:1.5px solid #d4c5a0;border-radius:24px;
  background:rgba(255,255,255,.6);color:var(--ink);
  font-size:14px;outline:none;font-family:inherit;
  transition:border .2s;
}
#topbar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(184,134,11,.08)}
#topbar .stats{color:var(--inkLight);font-size:13px;white-space:nowrap}
#topbar .btn-back{
  padding:8px 16px;border:1.5px solid var(--wood);border-radius:20px;
  background:transparent;color:var(--wood);font-size:13px;
  cursor:pointer;transition:all .2s;font-family:inherit;
  display:none;
}
#topbar .btn-back:hover{background:var(--wood);color:var(--paper)}
#topbar .btn-back.visible{display:inline-block}

/* 面包屑 */
#breadcrumb{
  padding:8px 24px;font-size:13px;color:var(--inkLight);
  background:var(--paperDark);border-bottom:1px solid #d4c5a0;
  flex-shrink:0;
}
#breadcrumb span{cursor:pointer;color:var(--accent);transition:color .15s}
#breadcrumb span:hover{color:var(--wood)}
#breadcrumb .sep{color:#c0a880;margin:0 6px;cursor:default}

/* 主内容区 */
#stage{flex:1;overflow-y:auto;padding:24px}

/* ========== L1: 书阁大厅 — 书架 ========== */
#shelves{display:flex;flex-direction:column;gap:32px}

.shelf-year{}
.shelf-year .year-label{
  font-size:26px;font-weight:700;color:var(--wood);margin-bottom:16px;
  padding-left:14px;border-left:5px solid var(--accent);
}
.shelf-board{
  background:linear-gradient(135deg,var(--shelf),#3e2410);
  border-radius:var(--radius);padding:18px 12px 8px;
  box-shadow:0 4px 20px rgba(60,30,10,.25),inset 0 -4px 0 rgba(0,0,0,.15);
  display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;
}
.shelf-board::after{
  content:'';display:block;width:100%;height:6px;
  background:linear-gradient(180deg,rgba(0,0,0,.3),transparent);margin-top:4px;
  border-radius:3px;
}

.month-book{
  width:72px;height:96px;border-radius:3px 8px 8px 3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:all .25s;
  box-shadow:2px 3px 8px rgba(0,0,0,.3),inset -3px 0 4px rgba(255,255,255,.05);
  border-left:4px solid rgba(0,0,0,.25);
}
.month-book::before{content:'';position:absolute;right:3px;top:4px;bottom:4px;width:3px;background:rgba(0,0,0,.2);border-radius:1px}
.month-book:hover{transform:translateY(-6px) scale(1.05);box-shadow:4px 8px 20px rgba(0,0,0,.35)}
.month-book .m-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.85);text-shadow:0 1px 2px rgba(0,0,0,.3)}
.month-book .m-count{font-size:10px;color:rgba(255,255,255,.5);margin-top:4px}
.month-book::after{content:'';position:absolute;left:2px;top:3px;bottom:3px;width:2px;background:rgba(255,255,255,.1);border-radius:1px}

/* ========== L2: 卷册详情 ========== */
#volume{display:flex;height:100%;gap:0}

.catalog-panel{
  width:200px;flex-shrink:0;background:var(--cardBG);
  border-right:2px solid #d4c5a0;padding:12px 0;overflow-y:auto;
}
.catalog-item{
  padding:10px 18px;font-size:13px;color:var(--inkLight);
  cursor:pointer;transition:all .15s;border-left:3px solid transparent;
  font-family:inherit;
}
.catalog-item:hover{background:rgba(184,134,11,.06);color:var(--ink)}
.catalog-item.active{border-left-color:var(--accent);background:rgba(184,134,11,.1);color:var(--wood);font-weight:600}
.catalog-item .count{font-size:11px;color:#b0a080;float:right}

.entity-list-panel{
  flex:1;overflow-y:auto;padding:20px 24px;
  background:linear-gradient(180deg,var(--cardBG),var(--paper));
}
.entity-list-panel h3{
  font-size:18px;color:var(--wood);margin-bottom:18px;
  padding-bottom:10px;border-bottom:2px solid var(--accentLight);
}

/* 打开的书籍效果 */
.open-book{
  background:linear-gradient(90deg,var(--paperDark) 0%,var(--cardBG) 4%,var(--cardBG) 96%,var(--paperDark) 100%);
  border-radius:6px 12px 12px 6px;padding:20px;min-height:200px;
  box-shadow:inset 0 0 30px rgba(139,105,20,.05);
  position:relative;
}
.open-book::before{content:'';position:absolute;left:0;top:0;bottom:0;width:8px;background:linear-gradient(90deg,rgba(0,0,0,.1),transparent);border-radius:4px 0 0 4px}

/* 实体卡片表格 */
.entity-table{width:100%;border-collapse:collapse;font-size:14px}
.entity-table th{
  text-align:left;padding:10px 14px;color:var(--wood);
  background:linear-gradient(180deg,rgba(184,134,11,.12),transparent);
  border-bottom:2px solid var(--accentLight);font-weight:600
}
.entity-table td{padding:10px 14px;border-bottom:1px solid #e8dcc0;color:var(--inkLight)}
.entity-table tr:hover td{background:rgba(184,134,11,.04)}
.entity-table .e-name{color:var(--ink);font-weight:600;cursor:pointer}
.entity-table .e-name:hover{color:var(--accent);text-decoration:underline}
.entity-table .rel-tag{
  display:inline-block;padding:2px 8px;margin:2px 3px;
  border-radius:10px;font-size:11px;cursor:pointer;
  background:rgba(184,134,11,.08);color:var(--woodDark);
  transition:all .15s;
}
.entity-table .rel-tag:hover{background:rgba(184,134,11,.2)}

/* ========== L3: 实体详情 ========== */
#entity-detail{
  max-width:680px;margin:0 auto;padding:32px 40px;
  background:linear-gradient(90deg,var(--paperDark) 0%,var(--cardBG) 3%,var(--cardBG) 97%,var(--paperDark) 100%);
  border-radius:8px 16px 16px 8px;box-shadow:var(--shadow),inset 0 0 40px rgba(139,105,20,.04);
}
#entity-detail h2{font-size:24px;color:var(--wood);margin-bottom:6px}
#entity-detail .e-meta{color:var(--inkLight);font-size:13px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #d4c5a0}
#entity-detail .e-stat{display:inline-block;margin-right:20px}
#entity-detail .e-stat strong{color:var(--wood)}
#entity-detail h4{color:var(--accent);font-size:14px;margin:18px 0 10px}
.rel-list{display:flex;flex-wrap:wrap;gap:8px}
.rel-card{
  padding:8px 14px;background:var(--cardBG);
  border:1px solid #d4c5a0;border-radius:var(--radius);
  cursor:pointer;transition:all .2s;font-size:13px;
}
.rel-card:hover{border-color:var(--accent);background:rgba(184,134,11,.06);transform:translateY(-1px)}
.rel-card .rel-name{font-weight:600;color:var(--wood)}
.rel-card .rel-type{font-size:11px;color:var(--inkLight)}

/* ========== 空状态 ========== */
.empty{padding:60px 20px;text-align:center;color:var(--inkLight);font-size:15px}
.empty .icon{font-size:48px;margin-bottom:12px}

/* loading */
.loading{padding:60px 20px;text-align:center;color:var(--inkLight)}
.loading::after{content:'...';animation:dot 1.2s infinite}
@keyframes dot{0%,20%{content:'.'}40%{content:'..'}60%,100%{content:'...'}}
</style>
</head>
<body>

<div id="topbar">
  <button class="btn-back" id="btnBack" onclick="goBack()">← 返回</button>
  <span class="logo">📚 宝利根·知书阁</span>
  <input type="text" id="searchInput" placeholder="搜索实体名称..." oninput="onSearch(this.value)"/>
  <span class="stats" id="statsText"></span>
  <button class="btn" id="btnRefresh" onclick="init()">🔄 刷新</button>
</div>
<div id="breadcrumb"></div>
<div id="stage"><div class="loading">加载中</div></div>

<script>
// ========== 全局状态 ==========
var G={nodes:[],edges:[],filtered:[],byYear:{},byMonth:{},byCat:{}};
var STATE={view:'shelves',year:null,month:null,cat:null,entityId:null,history:[]};
// 古籍书皮色系 — 暗沉厚重，有年代感
var COLORS=[
  '#3e2a1e','#2e3b2e','#3b2d2a','#2a3a4a',
  '#3d2d28','#3a2e3d','#2d3d3d','#3d3828',
  '#4a3028','#2d4035','#403828','#302e3a'
];
var CAT_NAMES=['模具设计','连接器设计','机械设计','标准件库','电气自动化','自动化产线','网络建设','工程技术规范','品质管理','供应商管理','财务文档','合同文件','办公文档','技术文档','公司制度','行政人事','项目管理'];

// ========== 初始化 ==========
function init(){
  document.getElementById('stage').innerHTML='<div class="loading">正在从书阁取书...</div>';
  document.getElementById('statsText').textContent='📊 加载中...';
  
  var gurl = parent.API ? (parent.API + '/api/graph/nodes') : '/api/graph/nodes';
  
  fetch(gurl, {cache: 'no-cache'})
    .then(function(r) { return r.json(); })
    .then(function(graphData) {
      G.nodes = graphData.nodes || [];
      G.edges = graphData.edges || [];
      document.getElementById('statsText').textContent = '📊 ' + G.nodes.length + ' 实体 · ' + G.edges.length + ' 关系';
      buildIndex();
      renderShelves();
    })
    .catch(function(e) {
      document.getElementById('stage').innerHTML = '<div class="empty"><div class="icon">📭</div>加载失败: ' + e.message + '</div>';
    });
}

function buildIndex(){
  G.byYear={};G.byMonth={};G.byCat={};
  G.nodes.forEach(function(n){
    var cat=n.type||'unknown';
    if(!G.byCat[cat])G.byCat[cat]=[];G.byCat[cat].push(n);
    
    // 软件工具单独归类到"软件阁"，按每页 50 条分多本工具书
    if(cat==='software'){
      if(!G.softwareBooks)G.softwareBooks={items:[],pageSize:50};
      G.softwareBooks.items.push(n);
      return;
    }
    
    // 正常实体按 mentions 密度分配到月份
    var m=n.mentions||0;
    var month=m%12+1;var monthKey=String(month).padStart(2,'0');
    var year='2025';
    if(m>30)year='2025';else if(m>15)year='2024';else year='2023';
    if(!G.byYear[year])G.byYear[year]={};
    if(!G.byYear[year][monthKey])G.byYear[year][monthKey]=[];
    G.byYear[year][monthKey].push(n);
  });
}

// ========== 路由 ==========
function renderShelves(){
  STATE={view:'shelves',year:null,month:null,cat:null,entityId:null,history:[]};
  updateBackButton();
  document.getElementById('breadcrumb').innerHTML='<span>🏠 书阁大厅</span>';
  var h='<div id="shelves">';
  
  // —— 软件阁：工具书 ——
  if(G.softwareBooks&&G.softwareBooks.items&&G.softwareBooks.items.length){
    var totalBooks=Math.ceil(G.softwareBooks.items.length/G.softwareBooks.pageSize);
    G.softwareBooks.totalBooks=totalBooks;
    h+='<div class="shelf-year"><div class="year-label">🛠️ 工具书 · '+G.softwareBooks.items.length+' 件</div>';
    h+='<div class="shelf-board">';
    for(var bi=0;bi<totalBooks;bi++){
      var color=COLORS[bi%COLORS.length];
      h+='<div class="month-book" style="background:linear-gradient(180deg,'+color+',#2c1810)" onclick="openSoftwareBook('+bi+')" title="工具书 Vol.'+(bi+1)+' · 第'+(bi*G.softwareBooks.pageSize+1)+'-'+Math.min((bi+1)*G.softwareBooks.pageSize,G.softwareBooks.items.length)+' 件">';
      h+='<span class="m-name">Vol.'+(bi+1)+'</span><span class="m-count">📖'+Math.min(G.softwareBooks.pageSize,G.softwareBooks.items.length-bi*G.softwareBooks.pageSize)+'</span></div>';
    }
    h+='</div></div>';
  }
  
  // —— 知识实体按年份 ——
  var years=Object.keys(G.byYear).sort().reverse();
  years.forEach(function(year){
    var months=G.byYear[year];var total=0;
    Object.values(months).forEach(function(arr){total+=arr.length});
    h+='<div class="shelf-year"><div class="year-label">📅 '+year+' 年 · '+total+' 卷</div>';
    h+='<div class="shelf-board">';
    var monthKeys=Object.keys(months).sort();
    monthKeys.forEach(function(mk,mi){
      var arr=months[mk];var color=COLORS[mi%COLORS.length];
      h+='<div class="month-book" style="background:linear-gradient(180deg,'+color+',#2c1810)" onclick="openMonth(\''+year+'\',\''+mk+'\')" title="'+year+'年'+mk+'月 · '+arr.length+' 实体">';
      h+='<span class="m-name">'+mk+'月</span><span class="m-count">📖'+arr.length+'</span></div>';
    });
    h+='</div></div>';
  });
  if(!years.length&&!G.softwareBooks.items.length)h+='<div class="empty"><div class="icon">📚</div>暂无实体数据，请先上传文档构建知识图谱</div>';
  h+='</div>';
  document.getElementById('stage').innerHTML=h;
  document.getElementById('stage').scrollTop=0;
}

function openMonth(year,month){
  STATE.history.push({view:'shelves'});
  STATE={view:'volume',year:year,month:month,cat:null,history:STATE.history};
  updateBackButton();
  var arr=G.byYear[year]&&G.byYear[year][month]?G.byYear[year][month]:[];
  document.getElementById('breadcrumb').innerHTML=
    '<span onclick="renderShelves()">🏠 书阁</span><span class="sep">/</span>'+
    '<span onclick="renderShelves()">'+year+' 年</span><span class="sep">/</span>'+
    month+' 月 · '+arr.length+' 典';
  renderVolume(arr);
}

function renderVolume(arr){
  // 按分类分组
  var byCat={};
  arr.forEach(function(n){
    var t=n.type||'unknown';if(!byCat[t])byCat[t]=[];byCat[t].push(n);
  });
  var cats=Object.keys(byCat);
  if(STATE.cat&&byCat[STATE.cat])cats=[STATE.cat];else STATE.cat=cats[0]||null;

  // 软件工具书分页
  var pageNum=STATE.page||0;
  var pageSize=50;
  var isSoftwareBook=(arr===G.softwareBooks&&G.softwareBooks.items)||false;
  
  var h='<div id="volume">';
  h+='<div class="catalog-panel">';
  if(isSoftwareBook){
    h+='<div class="catalog-item active">🛠️ 工具 <span class="count">'+G.softwareBooks.items.length+'</span></div>';
  }else{
    var allCats=Object.keys(byCat);
    allCats.forEach(function(c){
      h+='<div class="catalog-item'+(c===STATE.cat?' active':'')+'" onclick="selectCat(\''+c.replace(/'/g,"\\'")+'\')">'+c+' <span class="count">'+byCat[c].length+'</span></div>';
    });
  }
  h+='</div>';
  h+='<div class="entity-list-panel"><div class="open-book">';
  
  if(isSoftwareBook){
    // 工具书分页渲染
    var start=pageNum*pageSize;
    var end=Math.min(start+pageSize,G.softwareBooks.items.length);
    var pageItems=G.softwareBooks.items.slice(start,end);
    var totalPages=G.softwareBooks.totalBooks||Math.ceil(G.softwareBooks.items.length/pageSize);
    h+='<h3>🛠️ 工具书 · Vol.'+(pageNum+1)+'/'+totalPages+' ('+pageItems.length+' 件，共 '+G.softwareBooks.items.length+')</h3>';
    h+='<table class="entity-table"><thead><tr><th>名称</th><th>类型</th><th>大小</th><th>操作</th></tr></thead><tbody>';
    pageItems.forEach(function(n){
      h+='<tr>'+
          '<td>💿 <span class="e-name" onclick="openEntity(\''+n.id.replace(/'/g,"\\'")+'\')">'+esc(n.id.length>30?n.id.substr(0,28)+'...':n.id)+'</span></td>'+
          '<td>软件工具</td>'+
          '<td>'+esc(n.size_str||'未知')+'</td>'+
          '<td><a href="http://172.25.30.16:8090/api/download?path='+encodeURIComponent((n.category||'uncategorized')+'/'+(n.full_name||n.id))+'">📥 下载</a></td>'+
        '</tr>';
    });
    h+='</tbody></table>';
    // 分页控件
    h+='<div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:24px;padding-top:16px;border-top:1px solid #d4c5a0">';
    h+='<button onclick="openSoftwareBook(0)" style="padding:6px 14px;border:1px solid var(--wood);border-radius:16px;background:transparent;color:var(--wood);cursor:pointer;font-size:13px"'+(pageNum===0?' disabled':'')+'>« 首页</button>';
    h+='<button onclick="openSoftwareBook('+(pageNum-1)+')" style="padding:6px 14px;border:1px solid var(--wood);border-radius:16px;background:transparent;color:var(--wood);cursor:pointer;font-size:13px"'+(pageNum===0?' disabled':'')+'>‹ 上一页</button>';
    h+='<span style="color:var(--inkLight);font-size:13px">第 '+(start+1)+'-'+end+' / 共 '+G.softwareBooks.items.length+'</span>';
    h+='<button onclick="openSoftwareBook('+(pageNum+1)+')" style="padding:6px 14px;border:1px solid var(--wood);border-radius:16px;background:transparent;color:var(--wood);cursor:pointer;font-size:13px"'+(pageNum>=totalPages-1?' disabled':'')+'>下一页 ›</button>';
    h+='<button onclick="openSoftwareBook('+(totalPages-1)+')" style="padding:6px 14px;border:1px solid var(--wood);border-radius:16px;background:transparent;color:var(--wood);cursor:pointer;font-size:13px"'+(pageNum>=totalPages-1?' disabled':'')+'>末页 »</button>';
    h+='</div>';
  }else if(STATE.cat&&byCat[STATE.cat]){
    var items=byCat[STATE.cat];
    h+='<h3>📖 '+STATE.cat+' ('+items.length+')</h3>';
    h+='<table class="entity-table"><thead><tr><th>名称</th><th>类型</th><th>提及</th><th>关联实体</th></tr></thead><tbody>';
    items.forEach(function(n){
      var rels=getRelated(n.id);
      var relTags=rels.slice(0,4).map(function(r){
        return '<span class="rel-tag" onclick="event.stopPropagation();openEntity(\''+r.id.replace(/'/g,"\\'")+'\')" title="'+r.relation+'">'+esc(r.id.substr(0,12))+'</span>';
      }).join('');
    
    h+='<tr>'+
        '<td><span class="e-name" onclick="openEntity(\''+n.id.replace(/'/g,"\\'")+'\')">'+esc(n.id.length>30?n.id.substr(0,28)+'...':n.id)+'</span></td>'+
        '<td>'+esc(n.type||'unknown')+'</td>'+
        '<td>'+n.mentions+'</td>'+
        '<td>'+(relTags||'<span style="color:#b0a080">-</span>')+'</td>'+
      '</tr>';
    });
    h+='</tbody></table>';
  }else{
    h+='<div class="empty">请选择左侧目录</div>';
  }
  h+='</div></div></div>';
  document.getElementById('stage').innerHTML=h;
  document.getElementById('stage').scrollTop=0;
}

// ========== 工具书分页入口 ==========
function openSoftwareBook(pageNum){
  STATE.history.push({view:'shelves'});
  STATE={view:'softwareBook',page:pageNum,history:STATE.history};
  updateBackButton();
  var totalPages=G.softwareBooks.totalBooks||Math.ceil(G.softwareBooks.items.length/G.softwareBooks.pageSize);
  document.getElementById('breadcrumb').innerHTML=
    '<span onclick="renderShelves()">🏠 书阁</span><span class="sep">/</span>'+
    '<span onclick="renderShelves()">🛠️ 工具书</span><span class="sep">/</span>'+
    'Vol.'+(pageNum+1)+'/'+totalPages;
  renderVolume(G.softwareBooks);
}

function selectCat(cat){
  STATE.cat=cat;
  var arr=G.byYear[STATE.year]&&G.byYear[STATE.year][STATE.month]?G.byYear[STATE.year][STATE.month]:[];
  renderVolume(arr);
}

// ========== L3: 实体详情 ==========
function openEntity(entityId){
  var n=findNode(entityId);if(!n)return;
  STATE.history.push({view:STATE.view,year:STATE.year,month:STATE.month,cat:STATE.cat,entityId:STATE.entityId});
  STATE={view:'detail',entityId:entityId,year:STATE.year,month:STATE.month,cat:STATE.cat,history:STATE.history};
  updateBackButton();
  
  // 软件实体特殊处理：带下载链接
  if(n.type==='software'){
    renderSoftwareDetail(n);return;
  }
  
  document.getElementById('breadcrumb').innerHTML=
    '<span onclick="renderShelves()">🏠 书阁</span><span class="sep">/</span>'+
    '<span>'+esc(n.id.substr(0,20))+'</span>';
  var rels=getRelated(n.id);
  var h='<div id="entity-detail">';
  h+='<h2>📖 '+esc(n.id)+'</h2>';
  h+='<div class="e-meta">';
  h+='<span class="e-stat">类型: <strong>'+esc(n.type||'unknown')+'</strong></span>';
  h+='<span class="e-stat">提及: <strong>'+n.mentions+' 次</strong></span>';
  h+='</div>';
  if(rels.length>0){
    h+='<h4>🔗 关联实体 ('+rels.length+')</h4><div class="rel-list">';
    rels.forEach(function(r){
      h+='<div class="rel-card" onclick="openEntity(\''+r.id.replace(/'/g,"\\'")+'\')">'+
        '<span class="rel-name">'+esc(r.id.length>18?r.id.substr(0,16)+'...':r.id)+'</span>'+
        '<br><span class="rel-type">'+esc(r.relation)+'</span></div>';
    });
    h+='</div>';
  }else{
    h+='<p style="color:var(--inkLight)">暂无关联实体</p>';
  }
  h+='<div style="margin-top:24px;text-align:center">'+
    '<button class="btn" onclick="goBack()" style="display:inline-block;padding:8px 20px;border:1.5px solid var(--wood);border-radius:20px;background:transparent;color:var(--wood);font-size:13px;cursor:pointer">← 返回</button></div>';
  h+='</div>';
  document.getElementById('stage').innerHTML=h;
  document.getElementById('stage').scrollTop=0;
}

function goBack(){
  var prev=STATE.history.pop();
  if(!prev){renderShelves();return}
  if(prev.view==='shelves'){renderShelves()}
  else if(prev.view==='volume'){
    STATE=prev;STATE.history=STATE.history||[];openMonth(prev.year,prev.month)
  }
  else if(prev.view==='softwareBook'){
    STATE=prev;STATE.history=STATE.history||[];openSoftwareBook(prev.page||0)
  }
  else if(prev.view==='detail'){
    STATE=prev;STATE.history=STATE.history||[];openEntity(prev.entityId)
  }
  else{renderShelves()}
}

function updateBackButton(){
  var btn=document.getElementById('btnBack');
  if(STATE.view==='shelves'||!STATE.history||!STATE.history.length){
    btn.classList.remove('visible')
  }else{
    btn.classList.add('visible')
  }
}

// ========== 搜索 ==========
var _searchTimer=null;
function onSearch(val){
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(function(){doSearch(val)},300);
}
function doSearch(q){
  if(!q||q.length<1){renderShelves();return}
  var lower=q.toLowerCase();
  var matched=G.nodes.filter(function(n){return n.id.toLowerCase().indexOf(lower)>=0});
  STATE={view:'search',query:q};
  document.getElementById('breadcrumb').innerHTML='<span>🔍 搜索: '+esc(q)+' ('+matched.length+' 结果)</span>';
  if(!matched.length){
    document.getElementById('stage').innerHTML='<div class="empty"><div class="icon">📭</div>未找到匹配实体</div>';
    return;
  }
  renderVolume(matched);
}

// ========== 工具函数 ==========
function renderSoftwareDetail(n){
  var h='<div id="entity-detail">';
  h+='<h2>💿 '+esc(n.id)+'</h2>';
  h+='<div class="e-meta">';
  h+='<span class="e-stat">类型: <strong>软件工具</strong></span>';
  h+='<span class="e-stat">大小: <strong>'+esc(n.size_str||'未知')+'</strong></span>';
  h+='<span class="e-stat">提及: <strong>'+n.mentions+' 次</strong></span>';
  h+='</div>';
  h+='<div style="margin:20px 0">';
  h+='<a href="http://172.25.30.16:8090/api/download?path='+encodeURIComponent((n.category||'uncategorized')+'/'+(n.full_name||n.id))+'" target="_blank" style="display:inline-block;padding:12px 28px;background:var(--wood);color:var(--paper);border-radius:24px;font-size:15px;font-weight:600;text-decoration:none">📥 下载文件</a>';
  h+='</div>';
  h+='<p style="color:var(--inkLight);font-size:13px">文件储存在装载机 F:\公司知识平台\原始文档\</p>';
  h+='<div style="margin-top:24px;text-align:center">'+
    '<button class="btn" onclick="goBack()" style="display:inline-block;padding:8px 20px;border:1.5px solid var(--wood);border-radius:20px;background:transparent;color:var(--wood);font-size:13px;cursor:pointer">← 返回</button></div>';
  h+='</div>';
  document.getElementById('stage').innerHTML=h;
  document.getElementById('stage').scrollTop=0;
}
function findNode(id){return G.nodes.find(function(n){return n.id===id})}
function getRelated(entityId){
  var seen={};var rels=[];
  G.edges.forEach(function(e){
    // 兼容数组格式 [from, to, relation] 和对象格式 {from, to, relation}
    var f=e.from||e[0]; var t=e.to||e[1]; var r=e.relation||e[2]||'co_occurs'; var w=e.weight||1;
    if(f===entityId&&!seen[t]){seen[t]=1;rels.push({id:t,relation:r,weight:w})}
    else if(t===entityId&&!seen[f]){seen[f]=1;rels.push({id:f,relation:r,weight:w})}
  });
  rels.sort(function(a,b){return b.weight-a.weight});
  return rels.slice(0,20);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// ========== 启动 ==========
init();
</script>

name: CI - kb-server
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: pip install fastapi uvicorn chromadb requests pytest pytest-asyncio
      - name: Unit tests
        run: python -m pytest tests/ -x --tb=short -q
      - name: Smoke test (API)
        run: python scripts/eval_smoke_lite.py
      - name: Security check
        run: |
          echo "Checking for leaked keys..."
          ! grep -rn "tp-criul\|sk-[a-zA-Z0-9]\{20,\}" src/ --include='*.py' && echo "✅ No keys leaked"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: |
          find src/ -name '*.py' -exec python -m py_compile {} \; 2>&1 | grep -v "SyntaxError" || echo "✅ Syntax OK"

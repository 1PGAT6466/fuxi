<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伏羲 · 企业知识认知系统</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
.role-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-left:8px}
.role-badge.admin{background:rgba(255,103,0,0.15);color:#ff6700}
.role-badge.user{background:rgba(32,168,216,0.15);color:#20a8d8}
.user-info{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
.user-info .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ff6700,#ff8c42);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.user-info .name{font-size:13px;font-weight:600;flex:1}
.user-info .logout{font-size:12px;color:var(--text3);cursor:pointer;padding:4px 8px;border-radius:6px}
.user-info .logout:hover{background:rgba(229,57,53,0.1);color:#e53935}
.nav-section.admin-only{display:none}
body.is-admin .nav-section.admin-only{display:block}
.nav-item.admin-only{display:none}
body.is-admin .nav-item.admin-only{display:block}
.page.admin-page{display:none}
body.is-admin .page.admin-page{display:block}
body.not-logged-in .sidebar,body.not-logged-in .main-area{display:none}
body.not-logged-in::after{content:'请先登录';display:flex;align-items:center;justify-content:center;position:fixed;inset:0;background:#faf8f5;font-size:18px;color:#999;z-index:9999}
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 56px - 48px)}
.chat-messages{flex:1;overflow-y:auto;padding:20px}
.message{margin-bottom:16px;max-width:80%}
.message.user{margin-left:auto}
.bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.7}
.user-bubble{background:var(--pri,#ff6700);color:#fff;border-bottom-right-radius:4px}
.ai-bubble{background:var(--card,#fff);border:1px solid var(--border,#e8e3dc);border-bottom-left-radius:4px}
.sources{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-left:16px}
.source-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,103,0,0.08);color:var(--pri,#ff6700)}
.typing{color:var(--text3,#999);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.5}}
.chat-input-area{padding:12px 20px;border-top:1px solid var(--border,#e8e3dc);background:var(--card,#fff)}
.chat-input-wrap{display:flex;gap:8px;align-items:flex-end}
.chat-input-wrap textarea{flex:1;padding:10px 14px;border:1px solid var(--border,#e8e3dc);border-radius:10px;font-size:14px;resize:none;outline:none;font-family:inherit;background:var(--bg,#faf8f5);max-height:120px}
.chat-input-wrap textarea:focus{border-color:var(--pri,#ff6700)}
.btn-send{padding:10px 20px;background:var(--pri,#ff6700);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.btn-send:hover{opacity:.9}
.search-box{display:flex;gap:8px;margin-bottom:20px}
.search-box input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:var(--card)}
.search-box button{padding:10px 20px;background:var(--pri);color:#fff;border:none;border-radius:10px;cursor:pointer}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.result-title{font-weight:600;margin-bottom:6px}
.result-text{font-size:13px;color:var(--text2);line-height:1.6}
.result-meta{font-size:11px;color:var(--text3);margin-top:6px}
.empty-state{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.stat-grid{display:grid;grid-template-template:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
</style>
</head>
<body class="not-logged-in">
<div class="sidebar">
    <div class="sidebar-brand"><div class="logo-icon">☰</div><span>伏羲</span></div>
    <div class="sidebar-nav">
        <div class="nav-section">用户功能</div>
        <div class="nav-item active" data-page="chat" onclick="switchPage('chat')"><span class="nav-icon">💬</span><span>智能对话</span></div>
        <div class="nav-item" data-page="search" onclick="switchPage('search')"><span class="nav-icon">🔍</span><span>知识搜索</span></div>
        <div class="nav-item" data-page="graph" onclick="switchPage('graph')"><span class="nav-icon">🕸️</span><span>知识图谱</span></div>
        <div class="nav-item" data-page="wiki" onclick="switchPage('wiki')"><span class="nav-icon">📚</span><span>Wiki 知识</span></div>
        <div class="nav-item" data-page="files" onclick="switchPage('files')"><span class="nav-icon">📁</span><span>文件管理</span></div>
        <div class="nav-section admin-only">管理功能</div>
        <div class="nav-item admin-only" data-page="admin-dashboard" onclick="switchPage('admin-dashboard')"><span class="nav-icon">📊</span><span>数据面板</span></div>
        <div class="nav-item admin-only" data-page="admin-organs" onclick="switchPage('admin-organs')"><span class="nav-icon">🫀</span><span>器官状态</span></div>
        <div class="nav-item admin-only" data-page="admin-eval" onclick="switchPage('admin-eval')"><span class="nav-icon">📈</span><span>评测报告</span></div>
        <div class="nav-item admin-only" data-page="admin-flags" onclick="switchPage('admin-flags')"><span class="nav-icon">🚩</span><span>Feature Flags</span></div>
        <div class="nav-item admin-only" data-page="admin-feedback" onclick="switchPage('admin-feedback')"><span class="nav-icon">💬</span><span>用户反馈</span></div>
    </div>
    <div class="user-info">
        <div class="avatar" id="userAvatar">A</div>
        <div class="name"><span id="userName">用户</span><span class="role-badge" id="roleBadge">user</span></div>
        <span class="logout" onclick="logout()">退出</span>
    </div>
</div>
<div class="main-area">
    <div class="topbar">
        <div class="topbar-title" id="pageTitle">智能对话</div>
        <div class="topbar-actions"><span id="statusText"></span></div>
    </div>
    <div class="content">
        <div class="page active" id="page-chat">
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"><div class="empty-state"><div class="empty-icon">☰</div><h3>有什么想问的？</h3><p>输入问题，伏羲会从知识库中检索并回答</p></div></div>
                <div class="chat-input-area"><div class="chat-input-wrap"><textarea id="chatInput" placeholder="输入你的问题..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea><button class="btn-send" onclick="sendMessage()">发送</button></div></div>
            </div>
        </div>
        <div class="page" id="page-search"><div class="page-header"><h2>知识搜索</h2></div><div class="search-box"><input type="text" id="searchInput" placeholder="输入关键词..." onkeydown="if(event.key==='Enter')doSearch()"><button onclick="doSearch()">搜索</button></div><div id="searchResults"></div></div>
        <div class="page" id="page-graph"><div class="page-header"><h2>知识图谱</h2></div><div id="graphContainer" style="height:500px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text3)">图谱加载中...</div></div>
        <div class="page" id="page-wiki"><div class="page-header"><h2>Wiki 知识库</h2></div><div id="wikiContent"></div></div>
        <div class="page" id="page-files"><div class="page-header"><h2>文件管理</h2></div><div id="filesContent"></div></div>
        <div class="page admin-page" id="page-admin-dashboard"><div class="page-header"><h2>数据面板</h2></div><div id="dashboardContent"></div></div>
        <div class="page admin-page" id="page-admin-organs"><div class="page-header"><h2>器官状态</h2></div><div id="organsContent"></div></div>
        <div class="page admin-page" id="page-admin-eval"><div class="page-header"><h2>评测报告</h2></div><div id="evalContent"></div></div>
        <div class="page admin-page" id="page-admin-flags"><div class="page-header"><h2>Feature Flags</h2></div><div id="flagsContent"></div></div>
        <div class="page admin-page" id="page-admin-feedback"><div class="page-header"><h2>用户反馈</h2></div><div id="feedbackContent"></div></div>
    </div>
</div>
<script src="/static/js/marked.min.js"></script>
<script src="/static/js/dompurify.min.js"></script>
<script src="/static/js/toast.js"></script>
<script>
const T='fuxi_token',U='***';
function getToken(){return localStorage.getItem(T)||''}
function getUser(){try{return JSON.parse(localStorage.getItem(U)||'{}')}catch(e){return{}}}
function checkAuth(){const t=getToken();if(!t){window.location.href='/login';return false}fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+t}}).then(r=>{if(!r.ok)throw new Error();return r.json()}).then(d=>{document.body.classList.remove('not-logged-in');document.getElementById('userName').textContent=d.username||'用户';document.getElementById('userAvatar').textContent=(d.username||'U')[0].toUpperCase();const role=d.role||'user';const badge=document.getElementById('roleBadge');badge.textContent=role==='admin'?'管理员':'用户';badge.className='role-badge '+role;if(role==='admin')document.body.classList.add('is-admin')}).catch(()=>{localStorage.removeItem(T);localStorage.removeItem(U);window.location.href='/login'});return true}
function logout(){localStorage.removeItem(T);localStorage.removeItem(U);window.location.href='/login'}
function apiFetch(url,opt){const t=getToken();opt=opt||{};opt.headers=opt.headers||{};if(t)opt.headers['Authorization']='Bearer '+t;if(!opt.headers['Content-Type']&&opt.body)opt.headers['Content-Type']='application/json';return fetch(url,opt)}
const PAGE_TITLES={chat:'智能对话',search:'知识搜索',graph:'知识图谱',wiki:'Wiki 知识',files:'文件管理','admin-dashboard':'数据面板','admin-organs':'器官状态','admin-eval':'评测报告','admin-flags':'Feature Flags','admin-feedback':'用户反馈'};
function switchPage(name){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));const page=document.getElementById('page-'+name);if(page)page.classList.add('active');const nav=document.querySelector('.nav-item[data-page="'+name+'"]');if(nav)nav.classList.add('active');document.getElementById('pageTitle').textContent=PAGE_TITLES[name]||name;if(name==='admin-flags')loadFlags();if(name==='admin-organs')loadOrgans();if(name==='admin-dashboard')loadDashboard()}
let chatHistory=[];
async function sendMessage(){const input=document.getElementById('chatInput');const q=input.value.trim();if(!q)return;input.value='';appendMessage('user',q);chatHistory.push({role:'user',content:q});const lid=appendMessage('loading','思考中...');try{const resp=await apiFetch('/api/chat',{method:'POST',body:JSON.stringify({query:q,history:chatHistory.slice(-6),stream:false})});const data=await resp.json();removeMessage(lid);const answer=data.answer||'未能生成回答';appendMessage('assistant',answer,data.sources);chatHistory.push({role:'assistant',content:answer})}catch(e){removeMessage(lid);appendMessage('error','请求失败: '+e.message)}}
function appendMessage(role,content,sources){const c=document.getElementById('chatMessages');const empty=c.querySelector('.empty-state');if(empty)empty.remove();const id='msg-'+Date.now();const d=document.createElement('div');d.id=id;d.className='message '+role;if(role==='user'){d.innerHTML='<div class="bubble user-bubble">'+esc(content)+'</div>'}else if(role==='loading'){d.innerHTML='<div class="bubble ai-bubble"><span class="typing">☰ 思考中...</span></div>'}else if(role==='error'){d.innerHTML='<div class="bubble ai-bubble" style="color:#e53935">'+esc(content)+'</div>'}else{let h='<div class="bubble ai-bubble">'+(typeof marked!=='undefined'?marked.parse(content):content)+'</div>';if(sources&&sources.length){h+='<div class="sources>';sources.slice(0,5).forEach((s,i)=>{h+='<span class="source-tag">📄 '+esc(s.file_name||s.title||'Ref '+(i+1))+'</span>'});h+='</div>'}d.innerHTML=h}c.appendChild(d);c.scrollTop=c.scrollHeight;return id}
function removeMessage(id){const el=document.getElementById(id);if(el)el.remove()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
async function doSearch(){const q=document.getElementById('searchInput').value.trim();if(!q)return;const c=document.getElementById('searchResults');c.innerHTML='<p style="color:var(--text3)">搜索中...</p>';try{const r=await apiFetch('/api/search?q='+encodeURIComponent(q));const d=await r.json();const res=d.results||[];if(!res.length){c.innerHTML='<p style="color:var(--text3)">未找到结果</p>';return}c.innerHTML=res.map((r,i)=>'<div class="result-card"><div class="result-title">'+esc(r.file_name||'?')+'</div><div class="result-text">'+esc((r.text||'').substring(0,200))+'</div><div class="result-meta">Score: '+(r.score||0).toFixed(2)+'</div></div>').join('')}catch(e){c.innerHTML='<p style="color:#e53935">搜索失败</p>'}}
async function loadFlags(){try{const r=await apiFetch('/api/feature-flags');const d=await r.json();const flags=d.flags||d.defaults||{};const c=document.getElementById('flagsContent');let h='<div class="stat-grid">';for(const[n,info]of Object.entries(flags)){const v=typeof info==='object'?info.value:info;const desc=typeof info==='object'?info.desc:'';h+='<div class="stat-card"><div><strong>'+n+'</strong><br><small>'+esc(desc)+'</small></div><label style="margin-left:auto"><input type="checkbox" '+(v?'checked':'')+' onchange="toggleFlag(\''+n+'\',this.checked)"></label></div>'}h+='</div>';c.innerHTML=h}catch(e){document.getElementById('flagsContent').innerHTML='<p>加载失败</p>'}}
async function toggleFlag(n,v){await apiFetch('/api/feature-flags/'+n,{method:'PUT',body:JSON.stringify({value:v})});if(typeof showToast!=='undefined')showToast(n+' = '+v,'success')}
async function loadOrgans(){try{const r=await apiFetch('/api/v2/status');const d=await r.json();const c=document.getElementById('organsContent');const organs=d.organs||[];let h='<div class="stat-grid">';organs.forEach(o=>{h+='<div class="stat-card"><span style="font-size:24px">'+(o.emoji||'🫀')+'</span><div><strong>'+(o.name||o.organ_id)+'</strong><br><small>'+(o.status||'ok')+'</small></div></div>'});h+='</div>';c.innerHTML=h}catch(e){document.getElementById('organsContent').innerHTML='<p>加载失败</p>'}}
async function loadDashboard(){try{const r=await apiFetch('/api/admin/metrics-summary');const d=await r.json();document.getElementById('dashboardContent').innerHTML='<div class="stat-card"><pre>'+JSON.stringify(d,null,2).substring(0,500)+'</pre></div>'}catch(e){document.getElementById('dashboardContent').innerHTML='<p>加载失败</p>'}}
checkAuth();
</script>
</body>
</html>

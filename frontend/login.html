<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伏羲 · 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#e0e0e0}
.login-container{width:400px;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:48px 40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#ff6700,#ff8c42);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:800;margin-bottom:12px;box-shadow:0 8px 24px rgba(255,103,0,0.3)}
.logo h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:2px}
.logo p{font-size:12px;color:rgba(255,255,255,0.5);margin-top:4px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:14px;outline:none;transition:all .2s}
.form-group input:focus{border-color:#ff6700;box-shadow:0 0 0 3px rgba(255,103,0,0.15)}
.form-group input::placeholder{color:rgba(255,255,255,0.3)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#ff6700,#ff8c42);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,103,0,0.4)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.error{color:#ff6b6b;font-size:13px;text-align:center;margin-top:12px;min-height:20px}
.toggle{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.5)}
.toggle a{color:#ff8c42;cursor:pointer;text-decoration:none;font-weight:500}
.toggle a:hover{text-decoration:underline}
.version{text-align:center;margin-top:24px;font-size:11px;color:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <div class="logo-icon">☰</div>
        <h1>伏 羲</h1>
        <p>企业知识认知系统</p>
    </div>
    <form id="loginForm">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">登 录</button>
        <div class="error" id="error"></div>
    </form>
    <div class="toggle">
        <span id="toggleText">没有账号？</span>
        <a id="toggleLink" onclick="toggleMode()">注册新账号</a>
    </div>
    <div class="version">伏羲 RAG 4.0 · v1.44</div>
</div>
<script>
let isLogin=true;
function toggleMode(){isLogin=!isLogin;document.getElementById('submitBtn').textContent=isLogin?'登 录':'注 册';document.getElementById('toggleText').textContent=isLogin?'没有账号？':'已有账号？';document.getElementById('toggleLink').textContent=isLogin?'注册新账号':'去登录';document.getElementById('error').textContent=''}
document.getElementById('loginForm').addEventListener('submit',async function(e){e.preventDefault();const u=document.getElementById('username').value.trim(),p=document.getElementById('password').value,el=document.getElementById('error'),btn=document.getElementById('submitBtn');if(!u||!p){el.textContent='请填写用户名和密码';return}btn.disabled=true;btn.textContent=isLogin?'登录中...':'注册中...';el.textContent='';try{const ep=isLogin?'/api/auth/login':'/api/auth/register';const r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(!r.ok){el.textContent=d.detail||d.error||'操作失败';return}if(isLogin){localStorage.setItem('fuxi_token',d.token);localStorage.setItem('fuxi_user',JSON.stringify({username:d.username,role:d.role,display_name:d.display_name}));window.location.href='/'}else{el.style.color='#2ecc71';el.textContent='注册成功，请登录';isLogin=true;document.getElementById('submitBtn').textContent='登 录';setTimeout(()=>{el.style.color=''},3000)}}catch(err){el.textContent='网络错误，请重试'}finally{btn.disabled=false;btn.textContent=isLogin?'登 录':'注 册'}});
if(localStorage.getItem('fuxi_token'))window.location.href='/';
</script>
</body>
</html>

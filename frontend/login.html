<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伏羲 · 登录</title>
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: https:;
  font-src 'self' data:;
  connect-src 'self' http://localhost:8080;
">
<link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
<div class="login-container">
    <div class="logo">
        <div class="logo-icon">☰</div>
        <h1>伏 羲</h1>
        <p>企业知识认知体系</p>
    </div>
    <form id="loginForm">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">登 录</button>
        <div class="error" id="error"></div>
    </form>
    <div class="toggle">
        <span id="toggleText">没有账号？</span>
        <a id="toggleLink" onclick="toggleMode()">注册新账号</a>
    </div>
    <div class="version">伏羲体系 · v1.50</div>
</div>
<script>
let isLogin=true;
function toggleMode(){isLogin=!isLogin;document.getElementById('submitBtn').textContent=isLogin?'登 录':'注 册';document.getElementById('toggleText').textContent=isLogin?'没有账号？':'已有账号？';document.getElementById('toggleLink').textContent=isLogin?'注册新账号':'去登录';document.getElementById('error').textContent=''}
document.getElementById('loginForm').addEventListener('submit',async function(e){e.preventDefault();const u=document.getElementById('username').value.trim(),p=document.getElementById('password').value,el=document.getElementById('error'),btn=document.getElementById('submitBtn');if(!u||!p){el.textContent='请填写用户名和密码';return}btn.disabled=true;btn.textContent=isLogin?'登录中...':'注册中...';el.textContent='';try{const ep=isLogin?'/api/auth/login':'/api/auth/register';const r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(!r.ok){el.textContent=d.detail||d.error||'操作失败';return}if(isLogin){sessionStorage.setItem('fuxi_token',d.token);sessionStorage.setItem('fuxi_user',JSON.stringify({username:d.username,role:d.role,display_name:d.display_name}));window.location.href='/'}else{el.style.color='#2ecc71';el.textContent='注册成功，请登录';isLogin=true;document.getElementById('submitBtn').textContent='登 录';setTimeout(()=>{el.style.color=''},3000)}}catch(err){el.textContent='网络错误，请重试'}finally{btn.disabled=false;btn.textContent=isLogin?'登 录':'注 册'}});
if(sessionStorage.getItem('fuxi_token'))window.location.href='/';
</script>
</body>
</html>
